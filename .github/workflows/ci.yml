name: Swift CI

on:
  push:
    branches: [ '*' ]
  workflow_dispatch:
  pull_request:
    branches:
      - '*'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: "Test Swift Package on Android"
        uses: skiptools/swift-android-action@v2
        with:
          swift-version: 6.3
          free-disk-space: true

